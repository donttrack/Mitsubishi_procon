climate:
  - platform: thermostat
    name: "Ecodan Ruimteklimaat"
    modbus_controller_id: procon

    # Huidige ruimtetemperatuur (40002 = adres 1)
    current_temperature_register:
      address: 1
      value_type: U_WORD
      read_lambda: |-
        return x / 10.0f;

    # Setpoint ruimte (40004 = adres 3)
    target_temperature_register:
      address: 3
      value_type: U_WORD
      write_lambda: |-
        return (uint16_t)(x * 10);
      read_lambda: |-
        return x / 10.0f;

    # Aan/uit via 40026 = adres 25
    command_on_register:
      address: 25
      value_type: U_WORD
      write_lambda: |-
        return 1;
    command_off_register:
      address: 25
      value_type: U_WORD
      write_lambda: |-
        return 0;

    # Modus via 40029 = adres 28
    mode_register:
      address: 28
      value_type: U_WORD
      write_lambda: |-
        if (x == climate::CLIMATE_MODE_HEAT) return 0;
        if (x == climate::CLIMATE_MODE_COOL) return 4;
        return 0;
      read_lambda: |-
        if (x == 0) return climate::CLIMATE_MODE_HEAT;
        if (x == 4) return climate::CLIMATE_MODE_COOL;
        return climate::CLIMATE_MODE_OFF;

    visual:
      min_temperature: 15
      max_temperature: 25
      temperature_step: 0.5
