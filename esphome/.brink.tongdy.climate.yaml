#### ABB B23 3phase kWh Meter ####

modbus_controller:
  - id: tongdy
    ## ABB meter slaveadress 3
    address: 4
    modbus_id: modbus1
    setup_priority: -10
    update_interval: 300s
    #timeout: 400ms
    ## change parity frome even to none on the ABB B23 meter
    
sensor:
  - platform: modbus_controller
    modbus_controller_id: tongdy
    name: "Tongdy CO₂"
    unit_of_measurement: "ppm"
    register_type: holding
    address: 0x0001
    value_type: U_WORD

  - platform: modbus_controller
    modbus_controller_id: tongdy
    name: "Tongdy Temperatuur"
    unit_of_measurement: "°C"
    register_type: holding
    address: 0x0002
    value_type: S_WORD
    filters:
      - multiply: 0.1

  - platform: modbus_controller
    modbus_controller_id: tongdy
    name: "Tongdy Luchtvochtigheid"
    unit_of_measurement: "%"
    register_type: holding
    address: 0x0003
    value_type: U_WORD
    filters:
      - multiply: 0.1

  - platform: modbus_controller
    modbus_controller_id: tongdy
    name: "Tongdy TVOC"
    unit_of_measurement: "ppb"
    register_type: holding
    address: 0x0004
    value_type: U_WORD

  - platform: modbus_controller
    modbus_controller_id: tongdy
    name: "Tongdy PM2.5"
    unit_of_measurement: "µg/m³"
    register_type: holding
    address: 0x0005
    value_type: U_WORD

# Toegevoegd: Modbus sniffer configuratie
esphome:
  name: modbus_sniffer
  platformio_options:
    board_build.flash_mode: dio

logger:
  level: VERY_VERBOSE
  baud_rate: 0   # zet de seriële log uit op UART0 zodat RS485 vrij is

uart:
  id: uart1
  tx_pin: GPIO6      # pas aan naar jouw RS485 TX-pin
  rx_pin: GPIO5      # pas aan naar jouw RS485 RX-pin
  baud_rate: 19200
  stop_bits: 1
  parity: NONE

modbus:
  id: modbus1
  uart_id: uart1
  send_wait_time: 200ms

modbus_controller:
  - id: tg9
    address: 1        # begin met 1, later aanpassen
    modbus_id: modbus1
    update_interval: 5s

# Dummy sensor puur om verkeer te genereren en te loggen
sensor:
  - platform: modbus_controller
    modbus_controller_id: tg9
    name: "Test Register"
    register_type: holding
    address: 0
    value_type: U_WORD
