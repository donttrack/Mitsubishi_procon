modbus_controller:
  - id: tongdy
    address: 12
    modbus_id: modbus1
    setup_priority: -10
    update_interval: 10s
    command_throttle: 350ms
 
sensor:
  - platform: modbus_controller
    modbus_controller_id: tongdy
    name: "Temp raw word1"
    register_type: holding
    address: 6
    value_type: U_WORD
    unit_of_measurement: "raw"

  - platform: modbus_controller
    modbus_controller_id: tongdy
    name: "Temp raw word2"
    register_type: holding
    address: 7
    value_type: U_WORD
    unit_of_measurement: "raw"
  
  - platform: modbus_controller
    modbus_controller_id: tongdy
    name: "tongdy activatie"
    register_type: holding
    address: 14
    value_type: U_WORD
