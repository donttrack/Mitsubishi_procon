modbus_controller:
  - id: tongdy
    address: 12
    modbus_id: modbus1
    setup_priority: -10
    update_interval: 10s
    command_throttle: 200ms
 
sensor:
  - platform: modbus_controller
    modbus_controller_id: tongdy
    name: "CO2 Concentratie"
    register_type: holding
    address: 4
    value_type: FP32
    unit_of_measurement: "ppm"

  - platform: modbus_controller
    modbus_controller_id: tongdy
    name: "Temperatuur"
    register_type: holding
    address: 6
    value_type: FP32
    unit_of_measurement: "°C"
    accuracy_decimals: 1

  - platform: modbus_controller
    modbus_controller_id: tongdy
    name: "Relatieve Vochtigheid"
    register_type: holding
    address: 8
    value_type: FP32
    unit_of_measurement: "%"
    accuracy_decimals: 1


