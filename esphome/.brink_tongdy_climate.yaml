modbus_controller:
  - id: tongdy
    address: 12
    modbus_id: modbus1
    setup_priority: -10
    update_interval: 400s
    #timeout: 400ms

sensor:
  # --- Actuele waarden ---
  - platform: modbus_controller
    modbus_controller_id: tongdy
    name: "TG9 Temperatuur"
    register_type: read
    address: 1004
    value_type: FP32
    unit_of_measurement: "°C"
    accuracy_decimals: 2

  - platform: modbus_controller
    modbus_controller_id: tongdy
    name: "TG9 Relatieve Vochtigheid"
    register_type: read
    address: 1006
    value_type: FP32
    unit_of_measurement: "%"
    accuracy_decimals: 2

  - platform: modbus_controller
    modbus_controller_id: tongdy
    name: "TG9 CO₂"
    register_type: read
    address: 1008
    value_type: FP32
    unit_of_measurement: "ppm"
    accuracy_decimals: 0

  - platform: modbus_controller
    modbus_controller_id: tongdy
    name: "TG9 TVOC"
    register_type: read
    address: 1010
    value_type: FP32
    unit_of_measurement: "mg/m³"
    accuracy_decimals: 3

  # --- 1-uursgemiddelden ---
  - platform: modbus_controller
    modbus_controller_id: tongdy
    name: "TG9 Temp 1h Gemiddelde"
    register_type: read
    address: 1104
    value_type: FP32
    unit_of_measurement: "°C"
    accuracy_decimals: 2

  - platform: modbus_controller
    modbus_controller_id: tongdy
    name: "TG9 RV 1h Gemiddelde"
    register_type: read
    address: 1106
    value_type: FP32
    unit_of_measurement: "%"
    accuracy_decimals: 2

  - platform: modbus_controller
    modbus_controller_id: tongdy
    name: "TG9 CO₂ 1h Gemiddelde"
    register_type: read
    address: 1108
    value_type: FP32
    unit_of_measurement: "ppm"
    accuracy_decimals: 0

  - platform: modbus_controller
    modbus_controller_id: tongdy
    name: "TG9 TVOC 1h Gemiddelde"
    register_type: read
    address: 1110
    value_type: FP32
    unit_of_measurement: "mg/m³"
    accuracy_decimals: 3

  # --- 24-uursgemiddelden ---
  - platform: modbus_controller
    modbus_controller_id: tongdy
    name: "TG9 Temp 24h Gemiddelde"
    register_type: read
    address: 1204
    value_type: FP32
    unit_of_measurement: "°C"
    accuracy_decimals: 2

  - platform: modbus_controller
    modbus_controller_id: tongdy
    name: "TG9 RV 24h Gemiddelde"
    register_type: read
    address: 1206
    value_type: FP32
    unit_of_measurement: "%"
    accuracy_decimals: 2

  - platform: modbus_controller
    modbus_controller_id: tongdy
    name: "TG9 CO₂ 24h Gemiddelde"
    register_type: read
    address: 1208
    value_type: FP32
    unit_of_measurement: "ppm"
    accuracy_decimals: 0

  - platform: modbus_controller
    modbus_controller_id: tongdy
    name: "TG9 TVOC 24h Gemiddelde"
    register_type: read
    address: 1210
    value_type: FP32
    unit_of_measurement: "mg/m³"
    accuracy_decimals: 3
