modbus_controller:
  - id: tongdy
    address: 12
    modbus_id: modbus1
    setup_priority: -10
    update_interval: 10s
    command_throttle: 200ms
 
sensor:
  - platform: modbus_controller
    modbus_controller_id: tongdy
    name: "TG9 CO₂ Concentratie"
    register_type: holding
    address: 4
    value_type: U_WORD
    unit_of_measurement: "ppm"
    accuracy_decimals: 1
    filters:
      - multiply: 0.01
