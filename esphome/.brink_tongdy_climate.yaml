modbus_controller:
  - id: tongdy
    address: 12
    modbus_id: modbus1
    setup_priority: -10
    update_interval: 10s
    command_throttle: 200ms
 
sensor:
  - platform: modbus_controller
    modbus_controller_id: tongdy
    name: "TG9 Temperatuur test"
    register_type: holding
    address: 1
    value_type: S_WORD
    unit_of_measurement: "°C"
    accuracy_decimals: 1
    filters:
      - multiply: 0.1

  - platform: modbus_controller
    modbus_controller_id: tongdy
    name: "TG9 RV test"
    register_type: holding
    address: 2
    value_type: U_WORD
    unit_of_measurement: "%"
    accuracy_decimals: 1
    filters:
      - multiply: 0.1
