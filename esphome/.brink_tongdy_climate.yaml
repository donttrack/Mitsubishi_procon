sensor:
  - platform: modbus_controller
    modbus_controller_id: tongdy
    name: "Tongdy PM2.5"
    register_type: holding
    address: 1000
    register_count: 2
    value_type: FP32
    swap: WORD
    unit_of_measurement: "µg/m³"

  - platform: modbus_controller
    modbus_controller_id: tongdy
    name: "Tongdy PM10"
    register_type: holding
    address: 1002
    register_count: 2
    value_type: FP32
    swap: WORD
    unit_of_measurement: "µg/m³"

  - platform: modbus_controller
    modbus_controller_id: tongdy
    name: "Tongdy Temperatuur"
    register_type: holding
    address: 1004
    register_count: 2
    value_type: FP32
    swap: WORD
    unit_of_measurement: "°C"

  - platform: modbus_controller
    modbus_controller_id: tongdy
    name: "Tongdy Luchtvochtigheid"
    register_type: holding
    address: 1006
    register_count: 2
    value_type: FP32
    swap: WORD
    unit_of_measurement: "%"

  - platform: modbus_controller
    modbus_controller_id: tongdy
    name: "Tongdy CO₂"
    register_type: holding
    address: 1008
    register_count: 2
    value_type: FP32
    swap: WORD
