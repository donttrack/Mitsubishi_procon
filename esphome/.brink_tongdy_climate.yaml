modbus_controller:
  - id: tongdy
    address: 12
    modbus_id: modbus1
    setup_priority: -10
    update_interval: 10s
    command_throttle: 350ms
 
sensor:
  - platform: modbus_controller
    modbus_controller_id: tongdy
    name: "TG9 activatie"
    register_type: holding
    address: 14
    value_type: U_WORD
    unit_of_measurement: "raw"

# Werkende CO₂
  - platform: modbus_controller
    modbus_controller_id: tongdy
    name: "TG9 CO₂"
    register_type: holding
    address: 4
    value_type: U_WORD
    unit_of_measurement: "ppm"
    accuracy_decimals: 1
    filters:
      - multiply: 0.01

# Temp/RV als FP32 op holding 6/8 (blijven we volgen of ze 'tot leven' komen)
  - platform: modbus_controller
    modbus_controller_id: tongdy
    name: "TG9 Temperatuur"
    register_type: holding
    address: 6
    value_type: FP32
    unit_of_measurement: "°C"
    accuracy_decimals: 1

  - platform: modbus_controller
    modbus_controller_id: tongdy
    name: "TG9 Relatieve Vochtigheid"
    register_type: holding
    address: 8
    value_type: FP32
    unit_of_measurement: "%"
    accuracy_decimals: 1
