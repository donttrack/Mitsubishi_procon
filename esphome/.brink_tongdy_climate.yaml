modbus_controller:
  - id: tongdy
    address: 12
    modbus_id: modbus1
    setup_priority: -10
    update_interval: 10s
    command_throttle: 200ms
 
sensor:
  # Lees registers 0 t/m 9 uit als ruwe waarden
  - platform: modbus_controller
    modbus_controller_id: tg9
    name: "Reg 0"
    register_type: holding
    address: 0
    value_type: U_WORD
    unit_of_measurement: "raw"

  - platform: modbus_controller
    modbus_controller_id: tg9
    name: "Reg 1"
    register_type: holding
