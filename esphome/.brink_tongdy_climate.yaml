modbus_controller:
  - id: tongdy
    address: 12         # Slave-adres van jouw Tongdy
    modbus_id: modbus1
    command_throttle: 380ms
    setup_priority: -10
    update_interval: 10s

sensor:
  - platform: modbus_controller
    modbus_controller_id: tongdy
    name: "Tongdy PM2.5"
    register_type: holding
    address: 1000
    register_count: 2
    value_type: FP32
    unit_of_measurement: "µg/m³"

  - platform: modbus_controller
    modbus_controller_id: tongdy
    name: "Tongdy PM10"
    register_type: holding
    address: 1002
    register_count: 2
    value_type: FP32
    unit_of_measurement: "µg/m³"

  - platform: modbus_controller
    modbus_controller_id: tongdy
    name: "Tongdy Temperatuur"
    register_type: holding
    address: 1004
    register_count: 2
    value_type: FP32
    unit_of_measurement: "°C"

  - platform: modbus_controller
    modbus_controller_id: tongdy
    name: "Tongdy Luchtvochtigheid"
    register_type: holding
    address: 1006
    register_count: 2
    value_type: FP32
    unit_of_measurement: "%"

  - platform: modbus_controller
    modbus_controller_id: tongdy
    name: "Tongdy CO₂"
    register_type: holding
    address: 1008
    register_count: 2
    value_type: FP32
    unit_of_measurement: "ppm"

  - platform: modbus_controller
    modbus_controller_id: tongdy
    name: "Tongdy TVOC"
    register_type: holding
    address: 1010
    register_count: 2
    value_type: FP32
    unit_of_measurement: "mg/m³"

