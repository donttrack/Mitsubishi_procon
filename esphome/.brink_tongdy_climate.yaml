modbus_controller:
  - id: tongdy
    address: 6
    modbus_id: modbus1
    setup_priority: -10
    update_interval: 400s
    #timeout: 400ms

sensor:
  - platform: modbus_controller
    modbus_controller_id: tongdy
    name: "Tongdy CO₂"
    unit_of_measurement: "ppm"
    register_type: holding
    address: 0x0001
    value_type: U_WORD

  - platform: modbus_controller
    modbus_controller_id: tongdy
    name: "Tongdy Temperatuur"
    unit_of_measurement: "°C"
    register_type: holding
    address: 0x0002
    value_type: S_WORD
    filters:
      - multiply: 0.1

  - platform: modbus_controller
    modbus_controller_id: tongdy
    name: "Tongdy Luchtvochtigheid"
    unit_of_measurement: "%"
    register_type: holding
    address: 0x0003
    value_type: U_WORD
    filters:
      - multiply: 0.1

  - platform: modbus_controller
    modbus_controller_id: tongdy
    name: "Tongdy TVOC"
    unit_of_measurement: "ppb"
    register_type: holding
    address: 0x0004
    value_type: U_WORD

  - platform: modbus_controller
    modbus_controller_id: tongdy
    name: "Tongdy PM2.5"
    unit_of_measurement: "µg/m³"
    register_type: holding
    address: 0x0005
    value_type: U_WORD
