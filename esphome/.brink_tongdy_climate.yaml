modbus_controller:
  - id: tongdy
    address: 12
    modbus_id: modbus1
    setup_priority: -10
    update_interval: 400s
    #timeout: 400ms

  # Lees registers 1 t/m 20 uit

    # Scan registers 1000 t/m 1020
  {% for reg in range(1000, 1021) %}
  - platform: modbus_controller
    modbus_controller_id: tongdy
    name: "Reg {{ reg }}"
    register_type: holding
    address: {{ reg }}
    value_type: U_WORD
  {% endfor %}


- platform: modbus_controller
    modbus_controller_id: tongdy
    name: "Tongdy PM2.5"
    register_type: holding
    address: 1000
    value_type: FP32
    register_count: 2
    byte_swap: false
    word_swap: true
    unit_of_measurement: "µg/m³"

