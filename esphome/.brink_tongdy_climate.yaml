modbus_controller:
  - id: tongdy
    address: 12         # Slave-adres van jouw Tongdy
    modbus_id: modbus1
    command_throttle: 380ms
    setup_priority: -10
    update_interval: 10s

sensor:
  # We lezen registers 1000 t/m 1011 uit als ruwe 16-bit waarden
  - platform: modbus_controller
    modbus_controller_id: tongdy
    name: "Reg 1000"
    register_type: holding
    address: 1000
    value_type: U_WORD

  - platform: modbus_controller
    modbus_controller_id: tongdy
    name: "Reg 1001"
    register_type: holding
    address: 1001
    value_type: U_WORD

