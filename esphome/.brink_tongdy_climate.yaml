modbus_controller:
  - id: tongdy
    address: 12
    modbus_id: modbus1
    setup_priority: -10
    update_interval: 10s
    command_throttle: 350ms
 
sensor:
  - platform: modbus_controller
    modbus_controller_id: tongdy
    name: "HOLD 0"
    register_type: holding
    address: 0
    value_type: U_WORD
    unit_of_measurement: "raw"

