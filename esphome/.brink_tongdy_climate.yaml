modbus_controller:
  - id: tongdy
    address: 12
    modbus_id: modbus1
    setup_priority: -10
    update_interval: 10s
    command_throttle: 200ms

sensor:
  # --- Actuele waarden ---
  - platform: modbus_controller
    modbus_controller_id: tongdy
    name: "TG9 Temperatuur"
    register_type: holding
    value_type: S_WORD
    accuracy_decimals: 1
    filters:
      - multiply: 0.1
    unit_of_measurement: "°C"



  - platform: modbus_controller
    modbus_controller_id: tongdy
    name: "TG9 Relatieve Vochtigheid"
    register_type: custom
    custom_command: "function_code=4 start_address=1006 register_count=2"
    value_type: FP32
    unit_of_measurement: "%"
    accuracy_decimals: 2

  - platform: modbus_controller
    modbus_controller_id: tongdy
    name: "TG9 CO₂"
    register_type: custom
    custom_command: "function_code=4 start_address=1008 register_count=2"
    value_type: FP32
    unit_of_measurement: "ppm"
    accuracy_decimals: 0

  - platform: modbus_controller
    modbus_controller_id: tongdy
    name: "TG9 TVOC"
    register_type: custom
    custom_command: "function_code=4 start_address=1010 register_count=2"
    value_type: FP32
    unit_of_measurement: "mg/m³"
    accuracy_decimals: 3

  # --- 1-uursgemiddelden ---
  - platform: modbus_controller
    modbus_controller_id: tongdy
    name: "TG9 Temp 1h Gemiddelde"
    register_type: custom
    custom_command: "function_code=4 start_address=1104 register_count=2"
    value_type: FP32
    unit_of_measurement: "°C"
    accuracy_decimals: 2

  - platform: modbus_controller
    modbus_controller_id: tongdy
    name: "TG9 RV 1h Gemiddelde"
    register_type: custom
    custom_command: "function_code=4 start_address=1106 register_count=2"
    value_type: FP32
    unit_of_measurement: "%"
    accuracy_decimals: 2

  - platform: modbus_controller
    modbus_controller_id: tongdy
    name: "TG9 CO₂ 1h Gemiddelde"
    register_type: custom
    custom_command: "function_code=4 start_address=1108 register_count=2"
    value_type: FP32
    unit_of_measurement: "ppm"
    accuracy_decimals: 0

  - platform: modbus_controller
    modbus_controller_id: tongdy
    name: "TG9 TVOC 1h Gemiddelde"
    register_type: custom
    custom_command: "function_code=4 start_address=1110 register_count=2"
    value_type: FP32
    unit_of_measurement: "mg/m³"
    accuracy_decimals: 3

  # --- 24-uursgemiddelden ---
  - platform: modbus_controller
    modbus_controller_id: tongdy
    name: "TG9 Temp 24h Gemiddelde"
    register_type: custom
    custom_command: "function_code=4 start_address=1204 register_count=2"
    value_type: FP32
    unit_of_measurement: "°C"
    accuracy_decimals: 2

  - platform: modbus_controller
    modbus_controller_id: tongdy
    name: "TG9 RV 24h Gemiddelde"
    register_type: custom
    custom_command: "function_code=4 start_address=1206 register_count=2"
    value_type: FP32
    unit_of_measurement: "%"
    accuracy_decimals: 2

  - platform: modbus_controller
    modbus_controller_id: tongdy
    name: "TG9 CO₂ 24h Gemiddelde"
    register_type: custom
    custom_command: "function_code=4 start_address=1208 register_count=2"
    value_type: FP32
    unit_of_measurement: "ppm"
    accuracy_decimals: 0

  - platform: modbus_controller
    modbus_controller_id: tongdy
    name: "TG9 TVOC 24h Gemiddelde"
    register_type: custom
    custom_command: "function_code=4 start_address=1210 register_count=2"
    value_type: FP32
    unit_of_measurement: "mg/m³"
    accuracy_decimals: 3

  # --- Test registers ---
  - platform: modbus_controller
    modbus_controller_id: tongdy
    name: "TG9 CO₂ test2"
    register_type: custom
    custom_command: "function_code=4 start_address=1003 register_count=2"
    value_type: FP32
    unit_of_measurement: "ppm"

  - platform: modbus_controller
    modbus_controller_id: tongdy
    name: "TG9 CO₂ test 2"
    register_type: custom
    custom_command: "function_code=4 start_address=1003 register_count=2"
    value_type: FP32_R
    unit_of_measurement: "ppm"
    accuracy_decimals: 0
