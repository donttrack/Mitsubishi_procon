modbus_controller:
  - id: tongdy
    address: 12
    modbus_id: modbus1
    setup_priority: -10
    update_interval: 400s
    #timeout: 400ms

# Controllers voor meerdere adressen
  - id: tongdy_addr1
    address: 2
    modbus_id: modbus1
    update_interval: 5s

  - id: tongdy_addr2
    address: 4
    modbus_id: modbus1
    update_interval: 5s

  - id: tongdy_addr3
    address: 5
    modbus_id: modbus1
    update_interval: 5s

  - id: tongdy_addr4
    address: 6
    modbus_id: modbus1
    update_interval: 5s

  - id: tongdy_addr5
    address: 7
    modbus_id: modbus1
    update_interval: 5s

# Test-sensoren voor elk adres
  - platform: modbus_controller
    modbus_controller_id: tongdy_addr1
    name: "Test CO₂ Addr 1"
    register_type: holding
    address: 0x0001
    value_type: U_WORD
    unit_of_measurement: "ppm"

  - platform: modbus_controller
    modbus_controller_id: tongdy_addr2
    name: "Test CO₂ Addr 2"
    register_type: holding
    address: 0x0001
    value_type: U_WORD
    unit_of_measurement: "ppm"

  - platform: modbus_controller
    modbus_controller_id: tongdy_addr3
    name: "Test CO₂ Addr 3"
    register_type: holding
    address: 0x0001
    value_type: U_WORD
    unit_of_measurement: "ppm"

  - platform: modbus_controller
    modbus_controller_id: tongdy_addr4
    name: "Test CO₂ Addr 4"
    register_type: holding
    address: 0x0001
    value_type: U_WORD
    unit_of_measurement: "ppm"

  - platform: modbus_controller
    modbus_controller_id: tongdy_addr5
    name: "Test CO₂ Addr 5"
    register_type: holding
    address: 0x0001
    value_type: U_WORD
    unit_of_measurement: "ppm"

  - platform: modbus_controller
    modbus_controller_id: tongdy
    name: "Tongdy CO₂"
    unit_of_measurement: "ppm"
    register_type: holding
    address: 0x0001
    value_type: U_WORD

  - platform: modbus_controller
    modbus_controller_id: tongdy
    name: "Tongdy Temperatuur"
    unit_of_measurement: "°C"
    register_type: holding
    address: 0x0002
    value_type: S_WORD
    filters:
      - multiply: 0.1

  - platform: modbus_controller
    modbus_controller_id: tongdy
    name: "Tongdy Luchtvochtigheid"
    unit_of_measurement: "%"
    register_type: holding
    address: 0x0003
    value_type: U_WORD
    filters:
      - multiply: 0.1

  - platform: modbus_controller
    modbus_controller_id: tongdy
    name: "Tongdy TVOC"
    unit_of_measurement: "ppb"
    register_type: holding
    address: 0x0004
    value_type: U_WORD

  - platform: modbus_controller
    modbus_controller_id: tongdy
    name: "Tongdy PM2.5"
    unit_of_measurement: "µg/m³"
    register_type: holding
    address: 0x0005
    value_type: U_WORD

  # Lees registers 1 t/m 20 uit
- platform: modbus_controller
    modbus_controller_id: tongdy
    name: "Tongdy PM2.5"
    register_type: holding
    address: 1000
    value_type: FP32
    register_count: 2
    byte_swap: false
    word_swap: true
    unit_of_measurement: "µg/m³"

  - platform: modbus_controller
    modbus_controller_id: tongdy
    name: "Tongdy PM10"
    register_type: holding
    address: 1002
    value_type: FP32
    register_count: 2
    byte_swap: false
    word_swap: true
    unit_of_measurement: "µg/m³"

  - platform: modbus_controller
    modbus_controller_id: tongdy
    name: "Tongdy Temperatuur"
    register_type: holding
    address: 1004
    value_type: FP32
    register_count: 2
    byte_swap: false
    word_swap: true
    unit_of_measurement: "°C"

  - platform: modbus_controller
    modbus_controller_id: tongdy
    name: "Tongdy Luchtvochtigheid"
    register_type: holding
    address: 1006
    value_type: FP32
    register_count: 2
    byte_swap: false
    word_swap: true
    unit_of_measurement: "%"

  - platform: modbus_controller
    modbus_controller_id: tongdy
    name: "Tongdy CO₂"
    register_type: holding
    address: 1008
    value_type: FP32
    register_count: 2
    byte_swap: false
    word_swap: true
    unit_of_measurement: "ppm"

  - platform: modbus_controller
    modbus_controller_id: tongdy
    name: "Tongdy TVOC"
    register_type: holding
    address: 1010
    value_type: FP32
    register_count: 2
    byte_swap: false
    word_swap: true
    unit_of_measurement: "mg/m³"

  - platform: modbus_controller
    modbus_controller_id: tongdy
    name: "Reg 1000-1001"
    register_type: holding
    address: 1000
    register_count: 2
    value_type: FP32
    byte_swap: false
    word_swap: true

  - platform: modbus_controller
    modbus_controller_id: tongdy
    name: "Reg 1002-1003"
    register_type: holding
    address: 1002
    register_count: 2
    value_type: FP32
    byte_swap: false
    word_swap: true

  - platform: modbus_controller
    modbus_controller_id: tongdy
    name: "Reg 1004-1005"
    register_type: holding
    address: 1004
    register_count: 2
    value_type: FP32
    byte_swap: false
    word_swap: true

  - platform: modbus_controller
    modbus_controller_id: tongdy
    name: "Reg 1006-1007"
    register_type: holding
    address: 1006
    register_count: 2
    value_type: FP32
    byte_swap: false
    word_swap: true

  - platform: modbus_controller
    modbus_controller_id: tongdy
    name: "Reg 1008-1009"
    register_type: holding
    address: 1008
    register_count: 2
    value_type: FP32
    byte_swap: false
    word_swap: true

  - platform: modbus_controller
    modbus_controller_id: tongdy
    name: "Reg 1010-1011"
    register_type: holding
    address: 1010
    register_count: 2
    value_type: FP32
    byte_swap: false
    word_swap: true
    
