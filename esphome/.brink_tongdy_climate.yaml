modbus_controller:
  - id: tongdy
    address: 12
    modbus_id: modbus1
    setup_priority: -10
    update_interval: 10s
    command_throttle: 200ms
 
sensor:
    # CO₂
  - platform: modbus_controller
    modbus_controller_id: tongdy
    name: "CO2 FP32"
    register_type: holding
    address: 4
    value_type: FP32
    unit_of_measurement: "ppm"

  - platform: modbus_controller
    modbus_controller_id: tongdy
    name: "CO2 FP32_R"
    register_type: holding
    address: 4
    value_type: FP32_R
    unit_of_measurement: "ppm"

  # Temperatuur
  - platform: modbus_controller
    modbus_controller_id: tongdy
    name: "Temp FP32"
    register_type: holding
    address: 6
    value_type: FP32
    unit_of_measurement: "°C"

  - platform: modbus_controller
    modbus_controller_id: tongdy
    name: "Temp FP32_R"
    register_type: holding
    address: 6
    value_type: FP32_R
    unit_of_measurement: "°C"

  # Relatieve Vochtigheid
  - platform: modbus_controller
    modbus_controller_id: tongdy
    name: "RV FP32"
    register_type: holding
    address: 8
    value_type: FP32
    unit_of_measurement: "%"

  - platform: modbus_controller
    modbus_controller_id: tongdy
    name: "RV FP32_R"
    register_type: holding
    address: 8
    value_type: FP32_R
    unit_of_measurement: "%"
